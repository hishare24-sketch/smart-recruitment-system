name: CI

# بوّابة الجودة (م0): تُشغَّل على كلّ PR ودفع لـ main — تمنع دمج أيّ كود يكسر
# الأنواع/الاختبارات/البناء. راجع DOC/QUALITY_SYSTEM_PLAN.md
on:
  push:
    branches: [main]
  pull_request:

# دفع أحدث يلغي الجاري على نفس الفرع (توفير وقت الرَنَر)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · unit · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  backend:
    name: Backend (Pest feature/unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array
      BROADCAST_CONNECTION: log
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          # الحزم المقفلة تتطلّب PHP >= 8.4.1 (الحاوية على 8.5) — نطابق ذلك في CI.
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, bcmath, intl, gd, zip, exif, pcntl
          coverage: none
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run tests
        run: php artisan test
