name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; newer pushes cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # نُزع Supabase (المرحلة 4). نسخة GitHub Pages بناء إنتاج بلا باك-إند
      # (VITE_USE_REAL_API غير مُعرّف → محاكاة محلية كاملة). نشر المكدّس الحقيقي
      # (NestJS) يأتي في المرحلة 6 (Docker/Nginx/staging).
      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5
        # Auto-enable Pages (source: GitHub Actions) so no manual settings step is needed
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages status polling occasionally exceeds the 10-minute default
          # ("Timeout reached, aborting!") — give slow service days more room
          # and tolerate more transient status-check errors before giving up.
          timeout: 1800000
          error_count: 15

      # The service sometimes recovers within minutes — one automatic retry
      # spares a manual re-push on transient Pages slowness.
      - name: Retry deploy once on failure
        if: failure()
        id: deployment_retry
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
          error_count: 15
