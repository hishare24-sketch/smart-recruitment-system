# انسخ هذا الملف إلى مجلد كونفيج الـ nginx المشترك على السيرفر
# ( غالبًا ~/nginx/conf.d/ أو sites-enabled داخل حاوية nginx )
# ثم reload للـ nginx المشترك.
#
# التطبيق Docker يستمع على: 127.0.0.1:8088

upstream mawazin_swift {
    server 127.0.0.1:8088;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name recruitment.mawazinswift.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name recruitment.mawazinswift.com;

    # عدّل المسارات حسب شهادات الـ nginx المشترك عندك
    ssl_certificate     /etc/letsencrypt/live/recruitment.mawazinswift.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recruitment.mawazinswift.com/privkey.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://mawazin_swift;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}
