# ضع هذا الملف في إعداد nginx على السيرفر (مثال: ~/nginx/conf.d/)
# ثم أعد تحميل nginx.
#
# DNS: A record → recruitment.mawazinswift.com → IP السيرفر
# شهادة SSL (مرة واحدة):
#   sudo certbot --nginx -d recruitment.mawazinswift.com
#
# التطبيق Docker يستمع على: 127.0.0.1:8080

upstream mawazin_swift_web {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name recruitment.mawazinswift.com;

    # بعد certbot عادة يحوّل لـ https تلقائيًا؛ هذا احتياطي
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name recruitment.mawazinswift.com;

    # عدّل المسارات إن كانت شهاداتك في مكان مختلف
    ssl_certificate     /etc/letsencrypt/live/recruitment.mawazinswift.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recruitment.mawazinswift.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://mawazin_swift_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# مطلوب لـ WebSocket (Reverb) — إن لم يكن معرّفًا عالميًا في nginx.conf:
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
