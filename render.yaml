# ===== مخطّط نشر Render — نسخة مجّانيّة (تجربة/إثبات) =====
# خدمة ويب واحدة + Postgres مجّانيّ. لا worker/Redis/Reverb (المجّانيّ لا يدعم العمّال ولا preDeploy).
# المعالجة متزامنة (sync)، والكاش/الجلسة ملفّات، والبثّ اللحظيّ مطفأ (log) — يعود بترقية للمدفوع.
# للترقية للمدفوع (نشر دائم + بثّ لحظيّ): استبدل هذا الملفّ بـ render.paid.yaml.
# النشر: Render → New → Blueprint → اختر المستودع → لن يطلب دفعًا.

databases:
  - name: recruitment-db
    databaseName: recruitment
    user: recruitment
    plan: free                 # مجّانيّ (يُحذف بعد 30 يومًا)
    postgresMajorVersion: "16"

envVarGroups:
  - name: recruitment-shared
    envVars:
      - key: APP_NAME
        value: "منظومة التوظيف الذكية"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false            # php artisan key:generate --show
      - key: APP_URL
        sync: false            # رابط onrender بعد الإنشاء
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: prefer
      # المجّانيّ: بلا worker/Redis → معالجة متزامنة + ملفّات
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: BROADCAST_CONNECTION
        value: log             # البثّ اللحظيّ مطفأ على المجّانيّ (يحتاج Reverb دائم التشغيل)
      # ——— البريد: log على المجّانيّ (لا يحتاج مفتاح؛ بدّله resend لاحقًا) ———
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: no-reply@recruitment.local
      - key: MAIL_FROM_NAME
        value: "منظومة التوظيف الذكية"
      # ——— اختياريّ ———
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

services:
  - type: web
    name: recruitment-api
    runtime: docker
    repo: https://github.com/hishare24-sketch/smart-recruitment-system
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /up
    # المجّانيّ: هجرة بمهلة (لا تُعلّق الاستيقاظ لو تباطأت القاعدة) ثمّ تقديم عبر
    # php artisan serve على 0.0.0.0 (ربط HTTP مضمون خلف بروكسي Render). exec ليصير PID 1.
    dockerCommand: "sh -c 'timeout 60 php artisan migrate --force || true; php artisan permission:insert || true; exec php artisan serve --host=0.0.0.0 --port=$PORT'"
    envVars:
      - fromGroup: recruitment-shared
      - key: DB_HOST
        fromDatabase: { name: recruitment-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: recruitment-db, property: port }
      - key: DB_DATABASE
        fromDatabase: { name: recruitment-db, property: database }
      - key: DB_USERNAME
        fromDatabase: { name: recruitment-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: recruitment-db, property: password }
