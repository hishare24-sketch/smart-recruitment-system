# ===== منظومة التوظيف — مكدّس كامل داخل Docker (nginx عام على 80/443) =====
# التشغيل:
#   cp .env.docker.example .env
#   docker compose up -d --build
#   docker compose run --rm certbot-init   # أول مرة بعد توجيه DNS
#   docker compose exec web nginx -s reload
#
# الدومين: https://recruitment.mawazinswift.com
# لا يحتاج nginx على المضيف.

name: mawazin-swift

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-recruitment}
      MYSQL_USER: ${DB_USERNAME:-recruitment}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: &laravel_env
      APP_NAME: ${APP_NAME:-منظومة التوظيف الذكية}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-https://recruitment.mawazinswift.com}
      APP_LOCALE: ar
      APP_FALLBACK_LOCALE: en
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-recruitment}
      DB_USERNAME: ${DB_USERNAME:-recruitment}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BROADCAST_CONNECTION: reverb
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: no-reply@recruitment.mawazinswift.com
      MAIL_FROM_NAME: ${APP_NAME:-منظومة التوظيف الذكية}
      REVERB_APP_ID: ${REVERB_APP_ID:-mawazin}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-v6zvrzamckeajqmbcfn0}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-reverb-secret-change-me}
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: "0.0.0.0"
      REVERB_SERVER_PORT: "8080"
      FRONTEND_URL: ${APP_URL:-https://recruitment.mawazinswift.com}
      RUN_MIGRATIONS: "1"
      PORT: "10000"
    volumes:
      - api_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r \"exit(@file_get_contents('http://127.0.0.1:10000/up')===false?1:0);\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - app

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *laravel_env
      RUN_MIGRATIONS: "0"
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=1"]
    volumes:
      - api_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *laravel_env
      RUN_MIGRATIONS: "0"
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    volumes:
      - api_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER: "1"
        VITE_APP_NAME: ${APP_NAME:-منظومة التوظيف الذكية}
        VITE_USE_REAL_API: "true"
        VITE_BASE_API_URL: /api
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-v6zvrzamckeajqmbcfn0}
        VITE_REVERB_HOST: ""
        VITE_REVERB_PORT: ""
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-recruitment.mawazinswift.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - app

  # أول مرة فقط: يصدر شهادة Let's Encrypt (webroot عبر حاوية web)
  certbot-init:
    image: certbot/certbot
    profiles: ["ssl"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    environment:
      DOMAIN: ${DOMAIN:-recruitment.mawazinswift.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@mawazinswift.com}
    entrypoint: >
      /bin/sh -c "certbot certonly --webroot
      -w /var/www/certbot
      -d $${DOMAIN}
      --email $${LETSENCRYPT_EMAIL}
      --agree-tos
      --no-eff-email
      --non-interactive"

  # تجديد تلقائي كل 12 ساعة
  certbot-renew:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    depends_on:
      - web
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
  api_storage:
  certbot_certs:
  certbot_www:
